<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Buat Calon Istriku yang Paling Spesial 💖</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        /* Gradasi animasi yang terlihat premium dan romantis */
        background: linear-gradient(-45deg, #ff9a9e, #fecfef, #ffb199, #ff0844);
        background-size: 400% 400%;
        animation: gradientBG 10s ease infinite;
        font-family: "Poppins", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
        padding: 20px;
        overflow: hidden; /* Supaya tidak bisa di-scroll saat hujan love */
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* Wadah konten utama agar rapi di tengah */
      .content-wrapper {
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1 {
        color: #d81b60;
        font-size: 28px;
        margin-bottom: 5px;
        font-weight: 700;
        text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.5);
      }

      .subtitle {
        color: #c2185b;
        font-size: 14px;
        margin-bottom: 25px;
        font-weight: 600;
      }

      /* Wadah agar tombol berjajar rapi saat awal dibuka */
      .button-group {
        display: flex;
        gap: 15px;
        justify-content: center;
        align-items: center;
        margin-top: 10px;
      }

      .btn {
        padding: 12px 28px;
        font-size: 18px;
        font-family: "Poppins", sans-serif;
        font-weight: 600;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        z-index: 20;
      }

      #yesBtn {
        background: linear-gradient(45deg, #f5296d, #ff5b8c);
        color: white;
        box-shadow: 0 4px 15px rgba(245, 41, 109, 0.4);
        /* Animasi detak agar tombol ini lebih menggoda untuk diklik */
        animation: pulseBtn 1.5s infinite;
      }

      @keyframes pulseBtn {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      #yesBtn:hover {
        transform: scale(1.1);
      }

      /* Posisi awal tidak absolute, agar berjejer dengan rapi */
      #noBtn {
        background-color: #ffffff;
        color: #d81b60;
        border: 2px solid #d81b60;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .gif {
        width: 220px;
        margin-bottom: 20px;
        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(245, 41, 109, 0.2);
        animation: floatImg 3s ease-in-out infinite;
      }

      @keyframes floatImg {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
        100% {
          transform: translateY(0px);
        }
      }

      /* --- ANIMASI HUJAN LOVE --- */
      .hearts-container {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none; /* Agar tidak menghalangi klik tombol */
        z-index: 1;
      }

      .heart {
        position: absolute;
        bottom: -100px;
        font-size: 20px;
        animation: floatUp 4s infinite ease-in;
        opacity: 0.6;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0) scale(0.8) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(-100vh) scale(1.5) rotate(360deg);
          opacity: 0;
        }
      }

      .heart:nth-child(1) {
        left: 10%;
        animation-duration: 5s;
        animation-delay: 0s;
        font-size: 25px;
      }
      .heart:nth-child(2) {
        left: 30%;
        animation-duration: 4s;
        animation-delay: 1s;
        font-size: 15px;
      }
      .heart:nth-child(3) {
        left: 50%;
        animation-duration: 6s;
        animation-delay: 2s;
        font-size: 30px;
      }
      .heart:nth-child(4) {
        left: 70%;
        animation-duration: 5s;
        animation-delay: 0.5s;
        font-size: 20px;
      }
      .heart:nth-child(5) {
        left: 90%;
        animation-duration: 4.5s;
        animation-delay: 1.5s;
        font-size: 28px;
      }
      .heart:nth-child(6) {
        left: 40%;
        animation-duration: 5.5s;
        animation-delay: 0.2s;
        font-size: 22px;
      }
      .heart:nth-child(7) {
        left: 80%;
        animation-duration: 4.8s;
        animation-delay: 1.2s;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div class="hearts-container">
      <div class="heart">💖</div>
      <div class="heart">💕</div>
      <div class="heart">💗</div>
      <div class="heart">💓</div>
      <div class="heart">💞</div>
      <div class="heart">❤️</div>
      <div class="heart">✨</div>
    </div>

    <div class="content-wrapper">
      <img
        src="https://i.pinimg.com/originals/0a/c6/af/0ac6afbeb2e793ad9cf11347c63a296e.gif"
        class="gif"
        alt="Cute Bear"
      />

      <h1>Hai Cantik, Kamu sayang aku nggak? 😚</h1>
      <p class="subtitle">Jawab yang jujur yaa dari dalam hati... ❤️</p>

      <div class="button-group">
        <button class="btn" id="yesBtn" onclick="kirimJawaban()">
          Iyaa 💖
        </button>
        <button class="btn" id="noBtn">Enggak 😜</button>
      </div>
    </div>

    <script>
      const noBtn = document.getElementById("noBtn");

      // Kata-kata lucu saat tombol 'Enggak' kabur biar dia salting
      const teksLucu = [
        "Yee meleset! 😜",
        "Pencet sebelahnya aja 🥺",
        "Dih maksa wkwk",
        "Gabisa dipencet wlee",
        "Sayang aku aja udah! ❤️",
        "Curang ih mau kabur",
        "wlee ga kena wlee😜 ",
      ];
      let hitungHover = 0;

      function pindah(e) {
        if (e) e.preventDefault(); // Mencegah klik paksa di layar sentuh HP

        // Mengubah posisi menjadi absolute HANYA saat disentuh pertama kali
        noBtn.style.position = "absolute";

        // Teks tombol berubah setiap kali kabur
        noBtn.innerText = teksLucu[hitungHover % teksLucu.length];
        hitungHover++;

        // Logika koordinat agar tidak keluar layar
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
        const y =
          Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);

        noBtn.style.left = `${Math.max(10, x)}px`;
        noBtn.style.top = `${Math.max(10, y)}px`;
      }

      noBtn.addEventListener("mouseover", pindah);
      noBtn.addEventListener("touchstart", pindah);

      // Fungsi pas dia nyerah dan klik "Iyaa"
      function kirimJawaban() {
        // Ganti seluruh isi layar jadi pesan romantis (Bikin tambah salting!)
        document.body.innerHTML = `
          <div style="z-index: 100; text-align: center; color: white; padding: 20px; animation: pulseBtn 2s infinite;">
            <h1 style="color: white; font-size: 32px; text-shadow: 2px 2px 10px rgba(0,0,0,0.2);">Awww... Aku lebihh sayang banget sama kamuuu!! 😍💖❤️</h1>
            <p style="font-size: 18px; margin-top: 10px;">Tunggu bentar yaa cintaku... ✨</p>
          </div>
        `;

        // Jeda 2.5 detik sebelum diarahkan ke WhatsApp
        setTimeout(() => {
          const nomorTujuan = "6283892716161"; // Ganti dengan nomor WA
          const pesan = encodeURIComponent(
            "Haii ganteng! Aku cuma mau bilang kalau aku SAYAAANGG banget sama kamu!!! Lebih dari yang kamu tau awww \u{1F90D}\u{1F90D}\u{1F90D}",
          );
          const linkWa = `https://wa.me/${nomorTujuan}?text=${pesan}`;
          window.location.href = linkWa;
        }, 2500);
      }
    </script>
  </body>
</html>
